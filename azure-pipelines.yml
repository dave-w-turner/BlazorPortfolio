trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
  - task: DotNetCoreCLI@2
    inputs:
      azureSubscription: 'Azure subscription 1(0d9eff65-1b86-4467-a230-fc35f2dcacec)'
      command: 'restore'
      projects: '**/CorporatePortfolio.slnx'
      feedsToUse: 'select'
      vstsFeed: 'b41853a4-9df0-4837-819c-c6c90e6bfcd8'
  - task: DotNetCoreCLI@2
    inputs:
      azureSubscription: 'Azure subscription 1(0d9eff65-1b86-4467-a230-fc35f2dcacec)'
      command: 'build'
      projects: '**/CorporatePortfolio.slnx'
  - task: DotNetCoreCLI@2
    inputs:
      azureSubscription: 'Azure subscription 1(0d9eff65-1b86-4467-a230-fc35f2dcacec)'
      command: 'publish'
      publishWebProjects: true